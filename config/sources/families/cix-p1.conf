declare -g LINUXFAMILY="cix-p1"
declare -g ARCH="arm64"
declare -g BOOTCONFIG="none"
declare -g UEFI_GRUB_TIMEOUT=3
declare -g SERIALCON="" # Disable automatic console= parameter additions

case $BRANCH in

	vendor)
		declare -g KERNEL_MAJOR_MINOR="6.6" # Major and minor versions of this kernel.
		declare -g LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"
		KERNELSOURCE='https://github.com/armbian/linux-cix.git'
		KERNELBRANCH='branch:cix-6.6-2025q4'
		KERNELPATCHDIR='cix-2025-Q4'
		declare -g INSTALL_ARMBIAN_FIRMWARE=yes
		declare -g -i KERNEL_GIT_CACHE_TTL=120 # 2 minutes; this is a high-traffic repo
		enable_extension "grub"
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="loglevel=4 kasan=off video=efifb:off arm-smmu-v3.disable_bypass=0 cma=640M rootwait rw linlon-dp.enable_render=0" # linlon-dp.enable_render=0 for Panthor, video=efifb:off to workaround fb handover conflict
		declare -g EXTRAWIFI="no"
		# Disable boot logo/splash parameters that grub extension adds
		declare -g BOOT_LOGO="no"
		;;
	current)
		declare -g KERNEL_MAJOR_MINOR="6.18"
		declare -g LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"
		declare -g KERNELPATCHDIR="archive/cix-${KERNEL_MAJOR_MINOR}"
		declare -g INSTALL_ARMBIAN_FIRMWARE=no
		enable_extension "grub"
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="efi=noruntime clk_ignore_unused linlon_dp.enable_fb=1 nowatchdog watchdog_dev.handle_boot_enabled=0"
		declare -g EXTRAWIFI="no"
		# Disable boot logo/splash parameters that grub extension adds
		declare -g BOOT_LOGO="no"
		#declare -g INSTALL_HEADERS="yes"
		;;
	edge)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		declare -g LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"
		declare -g KERNELPATCHDIR="archive/cix-${KERNEL_MAJOR_MINOR}"
		declare -g INSTALL_ARMBIAN_FIRMWARE=no
		enable_extension "grub"
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="efi=noruntime clk_ignore_unused linlon_dp.enable_fb=1 nowatchdog watchdog_dev.handle_boot_enabled=0"
		declare -g EXTRAWIFI="no"
		# Disable boot logo/splash parameters that grub extension adds
		declare -g BOOT_LOGO="no"
		#declare -g INSTALL_HEADERS="yes"
		;;

esac

if [[ "${BRANCH}" == "current" ]] || [[ "${BRANCH}" == "edge" ]]; then
	MODULES_BLACKLIST="armchina_npu" # Disable armchina_npu driver as the kernel crashes on boot with it enabled
fi

function post_family_config__add_vpu_driver() {
	if [[ "${BRANCH}" == "current" ]] || [[ "${BRANCH}" == "edge" ]]; then
		display_alert "$BOARD" "Fetching VPU driver source" "info"
		fetch_from_repo "https://github.com/cixtech/cix_opensource__vpu_driver" "cix_opensource__vpu_driver" "branch:cix_mainline_dev"
		display_alert "$BOARD" "Fetching NPU driver source" "info"
		fetch_from_repo "https://github.com/cixtech/cix_opensource__npu_driver" "cix_opensource__npu_driver" "branch:cix_mainline_dev"
	fi
}

# Custom kernel config hook to handle firmware
# todo: npu and vpu firmware coming from below. others needs to be checked
function custom_kernel_config__cix_p1_firmware_and_npu_and_vpu_driver() {
	if [[ -f .config ]]; then
		### Disable CONFIG_EXTRA_FIRMWARE - firmware will be loaded at runtime from sky1-firmware package
		display_alert "$BOARD" "Disabling embedded firmware (will be loaded at runtime)" "info"
		kernel_config_modifying_hashes+=("CONFIG_EXTRA_FIRMWARE=\"\"")
		run_kernel_make_long_running olddefconfig

		### VPU driver
		kernel_config_modifying_hashes+=("cix_vpu_npu_drivers")		# Invalidate kernel cache
		display_alert "$BOARD" "Integrating VPU driver into kernel tree" "info"
		mkdir -p "${kernel_work_dir}"/drivers/staging/media/linlon
		cp -r "${SRC}"/cache/sources/cix_opensource__vpu_driver/driver/* "${kernel_work_dir}"/drivers/staging/media/linlon/
		sed -i 's/---help---/help/g' "${kernel_work_dir}"/drivers/staging/media/linlon/Kconfig	# Fix Kconfig syntax: ---help--- -> help
		echo "obj-\$(CONFIG_VIDEO_LINLON) += linlon/" >> "${kernel_work_dir}"/drivers/staging/media/Makefile
		echo 'source "drivers/staging/media/linlon/Kconfig"' >> "${kernel_work_dir}"/drivers/staging/media/Kconfig
		opts_m+=("CONFIG_VIDEO_LINLON")

		### NPU Driver
		display_alert "$BOARD" "Integrating NPU driver into kernel tree" "info"
		mkdir -p "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu
		cp -r "${SRC}"/cache/sources/cix_opensource__npu_driver/driver/armchina-npu/* "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/

		sed -i 's/---help---/help/g' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Kconfig
		sed -i 's/^\tbool /\ttristate /g' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Kconfig # Change bool to tristate to allow module building
		sed -i 's/select ARMCHINA_NPU$/imply ARMCHINA_NPU/g' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Kconfig # Change 'select' to 'imply' for ARMCHINA_NPU - select forces y which breaks modules

		
		sed -i '1a ccflags-y += -DKMD_VERSION=\\"6.1.0\\"' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Makefile # Add compile flags: KMD_VERSION and CONFIG_SKY1
		sed -i '1a ccflags-y += -DCONFIG_SKY1' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Makefile

		sed -i '/include.*\(default\|r329\)\/Makefile/d' "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Makefile # Remove unused Makefile includes (default, r329) - only SKY1 is used
		echo 'include $(src)/sky1/Makefile' >> "${kernel_work_dir}"/drivers/staging/armchina-npu/armchina-npu/Makefile
		echo "obj-\$(CONFIG_ARMCHINA_NPU) += armchina-npu/" > "${kernel_work_dir}"/drivers/staging/armchina-npu/Makefile # Create parent Makefile for staging directory
		sed -i '/^endif/i\source "drivers/staging/armchina-npu/armchina-npu/Kconfig"' "${kernel_work_dir}"/drivers/staging/Kconfig # Add to staging Kconfig - source before endif
		echo "obj-\$(CONFIG_ARMCHINA_NPU) += armchina-npu/" >> "${kernel_work_dir}"/drivers/staging/Makefile

		opts_m+=("CONFIG_ARMCHINA_NPU")
		opts_m+=("CONFIG_ARMCHINA_NPU_ARCH_V3")
		opts_m+=("CONFIG_ARMCHINA_NPU_SOC_SKY1")
		opts_n+=("CONFIG_ARMCHINA_NPU_SOC_DEFAULT")
	fi
}

family_tweaks() {
	if [[ "${BRANCH}" == "current" ]] || [[ "${BRANCH}" == "edge" ]]; then
		# Copy VPU firmware binaries to rootfs
			display_alert "$BOARD" "Installing VPU firmware" "info"
			mkdir -p "${SDCARD}"/lib/firmware/linlon
			cp "${SRC}"/cache/sources/cix_opensource__vpu_driver/firmware-binaries/*.fwb "${SDCARD}"/lib/firmware/
		# Grab DPS firmware blob
			display_alert "$BOARD" "Installing DSP firmware" "info"
			curl -fLo "${SDCARD}"/lib/firmware/dsp_fw.bin https://github.com/cixtech/cix_proprietary__cix_proprietary/raw/refs/heads/cix_p1_k6.6_master/cix_proprietary-debs/cix-audio-dsp/usr/lib/firmware/dsp_fw.bin 
		# Grab Mali firmware - this is in upstream linux-firmware repo. Not sure what to do here. Re-add to armbian-firmware?
			display_alert "$BOARD" "Installing Mali firmware" "info"
			mkdir -p "${SDCARD}"/lib/firmware/arm/mali/
			curl -fLo "${SDCARD}"/lib/firmware/arm/mali/arch12.8/mali_csffw.bin https://github.com/Sky1-Linux/sky1-firmware/raw/refs/heads/main/firmware/arm/mali/mali_csffw.bin 
		# Add Mali firmware to initramfs
		mkdir -p "${SDCARD}"/etc/initramfs-tools/hooks
		cat > "${SDCARD}"/etc/initramfs-tools/hooks/mali-firmware <<- 'HOOKEOF'
			#!/bin/sh
			. /usr/share/initramfs-tools/hook-functions
			mkdir -p "${DESTDIR}/lib/firmware/arm/mali/arch12.8"
			cp -p /lib/firmware/arm/mali/arch12.8/mali_csffw.bin "${DESTDIR}/lib/firmware/arm/mali/arch12.8/"
			HOOKEOF
		chmod +x "${SDCARD}"/etc/initramfs-tools/hooks/mali-firmware
	fi
}

# Override configure_grub to prevent unwanted cmdline modifications
configure_grub() {
	display_alert "Extension: grub: Configuring GRUB" "UEFI GRUB (cix-p1 override)" "info"

	# Enable Armbian Wallpaper on GRUB
	if [[ "${VENDOR}" == Armbian ]]; then
		display_alert "Extension: grub: Enabling" "Armbian Wallpaper on GRUB" "info"
		mkdir -p "${MOUNT}"/usr/share/desktop-base/
		cat <<- grubWallpaper >> "${MOUNT}"/usr/share/desktop-base/grub_background.sh
			WALLPAPER=/usr/share/images/grub/wallpaper.png
			COLOR_NORMAL=white/black
			COLOR_HIGHLIGHT=black/white
		grubWallpaper
		run_host_command_logged chmod -v +x "${MOUNT}"/usr/share/desktop-base/grub_background.sh
	fi

	# Write GRUB config WITHOUT modifying GRUB_CMDLINE_LINUX_DEFAULT
	display_alert "Extension: grub: GRUB EFI kernel cmdline" "cmdline '${GRUB_CMDLINE_LINUX_DEFAULT}' distro=${UEFI_GRUB_DISTRO_NAME} timeout=${UEFI_GRUB_TIMEOUT}" ""
	cat <<- grubCfgFrag >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
		GRUB_CMDLINE_LINUX_DEFAULT="${GRUB_CMDLINE_LINUX_DEFAULT}"
		GRUB_TIMEOUT_STYLE=menu
		GRUB_TIMEOUT=${UEFI_GRUB_TIMEOUT}
		GRUB_DISTRIBUTOR="${UEFI_GRUB_DISTRO_NAME}"
		GRUB_DISABLE_SUBMENU=y
		GRUB_DISABLE_OS_PROBER=false
		GRUB_FONT="/usr/share/grub/unicode.pf2"
		GRUB_GFXPAYLOAD=keep
		GRUB_DISABLE_UUID=false
		GRUB_DISABLE_LINUX_UUID=false
	grubCfgFrag

	if [[ "a${UEFI_GRUB_DISABLE_OS_PROBER}" != "a" ]]; then
		cat <<- grubCfgFragHostSide >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
			GRUB_DISABLE_OS_PROBER=${UEFI_GRUB_DISABLE_OS_PROBER}
		grubCfgFragHostSide
	fi

	if [[ "a${UEFI_GRUB_TERMINAL}" != "a" ]]; then
		cat <<- grubCfgFragTerminal >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
			GRUB_TERMINAL="${UEFI_GRUB_TERMINAL}"
		grubCfgFragTerminal
	fi
}
